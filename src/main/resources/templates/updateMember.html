<!DOCTYPE html>
<html xmlns:th="www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원수정</title>
</head>
<body>
    <h1>회원수정</h1>
    <form th:action="@{update}" method="post" th:object = "${dto}">
        <div>
            <label>ID : <span>[[*{id}]]</span></label>
            <input type="hidden" th:field = "*{id}"> <!--  수정 처리를 위해 post로 보낼 때만 필요함-->
        </div>
        <div>
            <label>이름</label>
            <input type="text" th:field = "*{name}">
        </div>
        <div>
            <label>나이</label>
            <input type="number" th:field = "*{age}" min="0" max="120">
        </div>
        <div>
            <label>주소</label>
            <input type="text" th:field = "*{address}">
        </div>
        <input type="submit" value="수정">
    </form>
    <a th:href="@{view}">목록으로 돌아가기</a>
</body>
</html>
