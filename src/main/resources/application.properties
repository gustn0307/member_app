spring.application.name=member_app

# MySQL \uC5F0\uACB0
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/member_db
# \uD658\uACBD\uC124\uC815 \uD30C\uC77C\uC5D0\uC11C \uD658\uACBD\uBCC0\uC218\uB97C \uB9CC\uB4DC\uB294 \uBC95
# 1. \uAD6C\uC131 \uD3B8\uC9D1 \uC5F4\uAE30: \uC778\uD154\uB9AC\uC81C\uC774 \uC6B0\uCE21 \uC0C1\uB2E8 \uC2E4\uD589 \uBC84\uD2BC \uC606\uC758 \uC560\uD50C\uB9AC\uCF00\uC774\uC158 \uBA85\uC744 \uD074\uB9AD\uD55C \uB4A4 Edit Configurations\uB97C \uC120\uD0DD\uD569\uB2C8\uB2E4.
# 2. \uD658\uACBD\uBCC0\uC218 \uCD94\uAC00: [Modify options] > [Environment variables]\uB97C \uC120\uD0DD\uD569\uB2C8\uB2E4.
# 3. \uAC12 \uC785\uB825: \uBCC0\uC218\uBA85(Key)\uACFC \uAC12(Value)\uC744 DB_USER=root;DB_PW=1111 \uD615\uD0DC\uB85C \uC785\uB825\uD569\uB2C8\uB2E4.
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PW}

# Hibernate SQL \uB85C\uADF8
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true

## \uD14C\uC774\uBE14 \uC790\uB3D9 \uC0DD\uC131 \uC804\uB7B5
# create : \uC5D4\uD2F0\uD2F0\uB85C \uB4F1\uB85D\uB41C \uD074\uB798\uC2A4\uC640 \uB9E4\uD551\uB418\uB294 \uD14C\uC774\uBE14\uC744 \uC790\uB3D9\uC73C\uB85C \uC0DD\uC131
#              \uC774 \uACFC\uC815\uC5D0\uC11C \uAE30\uC874\uC5D0 \uD574\uB2F9 \uD074\uB798\uC2A4\uC640 \uB9E4\uD551\uB418\uB294 \uD14C\uC774\uBE14\uC774 \uC874\uC7AC\uD558\uBA74
#              \uAE30\uC874 \uD14C\uC774\uBE14\uC744 \uC0AD\uC81C(drop)\uD558\uACE0 \uD14C\uC774\uBE14\uC744 \uC0DD\uC131
#              \uAC1C\uBC1C \uC644\uC804 \uCD08\uAE30\uC5D0 \uC0AC\uC6A9
# create-drop : \uC5D4\uD2F0\uD2F0\uB85C \uB4F1\uB85D\uB41C \uD074\uB798\uC2A4\uC640 \uB9E4\uD551\uB418\uB294 \uD14C\uC774\uBE14\uC774 \uC874\uC7AC\uD558\uBA74 \uAE30\uC874 \uD14C\uC774\uBE14\uC744 \uC0AD\uC81C\uD558\uACE0
#                      \uC790\uB3D9\uC73C\uB85C \uD14C\uC774\uBE14\uC744 \uC0DD\uC131\uD574\uC8FC\uB294 \uAC83\uC740 \uB611\uAC19\uC9C0\uB9CC,
#                      \uC560\uD50C\uB9AC\uCF00\uC774\uC158\uC774 \uC885\uB8CC\uB420 \uB54C \uD14C\uC774\uBE14\uC744 \uC0AD\uC81C\uD55C\uB2E4\uB294 \uCC28\uC774\uAC00 \uC788\uB2E4.
# update : \uC5D4\uD2F0\uD2F0\uB85C \uB4F1\uB85D\uB41C \uD074\uB798\uC2A4\uC640 \uB9E4\uD551\uB418\uB294 \uD14C\uC774\uBE14\uC774 \uC5C6\uC73C\uBA74 \uD14C\uC774\uBE14\uC744 \uC0C8\uB85C \uC0DD\uC131\uD558\uACE0
#               \uB9E4\uD551\uB418\uB294 \uAE30\uC874 \uD14C\uC774\uBE14\uC774 \uC874\uC7AC\uD558\uBA74 \uD14C\uC774\uBE14\uC744 \uC0C8\uB85C \uC0DD\uC131\uD558\uC9C0 \uC54A\uACE0 \uD14C\uC774\uBE14\uC758 \uCEEC\uB7FC\uC744 \uBCC0\uACBD\uD55C\uB2E4.
#               \uCEEC\uB7FC\uC744 \uBCC0\uACBD\uD558\uBA74\uC11C \uCEEC\uB7FC\uBA85\uC744 \uBC14\uAFB8\uBA74 \uC0C8\uB85C\uC6B4 \uCEEC\uB7FC\uC774 \uC0DD\uAE38 \uC218\uB3C4 \uC788\uB2E4
#               \uAC1C\uBC1C \uCD08\uAE30, \uC911\uAE30\uC5D0 \uC0AC\uC6A9
# validate : \uD14C\uC774\uBE14\uC744 \uC0DD\uC131\uD558\uAC70\uB098 \uC218\uC815\uD558\uC9C0 \uC54A\uACE0, \uC5D4\uD2F0\uD2F0 \uD074\uB798\uC2A4\uC640 \uD14C\uC774\uBE14\uC774 \uC815\uC0C1\uC801\uC73C\uB85C \uB9E4\uD551\uB418\uB294\uC9C0\uB9CC \uAC80\uC0AC
#                \uB9CC\uC57D \uD14C\uC774\uBE14\uC774 \uC874\uC7AC\uD558\uC9C0 \uC54A\uAC70\uB098, \uD14C\uC774\uBE14\uC5D0 \uC5D4\uD2F0\uD2F0\uC758 \uD544\uB4DC\uC5D0 \uB9E4\uD551\uB418\uB294 \uCEEC\uB7FC\uC774 \uC874\uC7AC\uD558\uC9C0 \uC54A\uC73C\uBA74
#                \uC608\uC678\uB97C \uBC1C\uC0DD\uC2DC\uD0A4\uBA74\uC11C \uC560\uD50C\uB9AC\uCF00\uC774\uC158\uC744 \uC885\uB8CC\uD55C\uB2E4
#                DB \uC548\uC815\uD654\uB418\uC5B4 \uC5D4\uD2F0\uD2F0\uC640 \uD14C\uC774\uBE14 \uAD6C\uC870\uAC00 \uBCC0\uACBD\uB420 \uC77C\uC774 \uC5C6\uC744 \uB54C \uC0AC\uC6A9
# none : \uC544\uBB34 \uC77C\uB3C4 \uC77C\uC5B4\uB098\uC9C0 \uC54A\uC74C, \uBC30\uD3EC\uD560 \uB54C \uC0AC\uC6A9
spring.jpa.hibernate.ddl-auto=update

# SQL \uBC14\uC778\uB529 \uD30C\uB77C\uBBF8\uD130 \uB85C\uADF8 \uCD9C\uB825
logging.level.org.hibernate.type.descriptor.sql=trace

# MySQL \uBC29\uC5B8 \uC124\uC815
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect